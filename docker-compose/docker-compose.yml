services:
  qdrant:
    profiles: ["infra"]
    build:
      context: ..
      dockerfile: docker-compose/qdrant.Dockerfile
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/data
      
  chabo:
    build:
      context: ..
      dockerfile: docker-compose/backend.Dockerfile
    ports:
      - "7860:7860"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      # Uncomment if using alternative LLM providers:
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - COHERE_API_KEY=${COHERE_API_KEY}
    volumes:
      - ..:/app            # Maps the root directory to /app
      - ../data:/app/data  # Specifically ensures the data folder is mapped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  chatui:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: chatui.Dockerfile
    ports:
      - "3000:3000"
    # For testing in non-HTTPS environments, enable this:
    environment:
      - ORIGIN=${UI_ORIGIN}
      # 2. Tell the app to stop being so strict about origin matching
      - CHECK_ORIGIN=false
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host

    volumes:
      - ./chatui.env.local:/app/.env.local:ro
      - chatui-db:/data/db
      - chatui-models:/data/models
    depends_on:
      chabo:
        condition: service_healthy

volumes:
  chatui-db:
  chatui-models:
  qdrant_data:
