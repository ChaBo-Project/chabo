[hf_endpoints]
embedding_endpoint_url = https://xxxxxxxxxxendpoints.huggingface.cloud
reranker_endpoint_url = https://xxxxxxxx.endpoints.huggingface.cloud
# For local TEI endpoints, set to:
# embedding_endpoint_url = http://tei-embedding:80
# reranker_endpoint_url = http://tei-reranker:80


[qdrant]
# Modes: 'native' for direct QdrantClient, 'gradio' for Gradio Gateway access
# for native just give url
# for local qdrant in docker compose pass mode=native and
# url = http://qdrant:6333, port = 6333
mode = native
url = org-name-of-space.hf.space
# NOTE: The API key should be set via QDRANT_API_KEY environment variable.
port = 443
collection = demo

[retrieval]
initial_k = 20
final_k = 5

[generator]
PROVIDER = huggingface
MODEL = https://xxxxxxxxxxx.huggingface.cloud
MAX_TOKENS = 1024
TEMPERATURE = 0.1
INFERENCE_PROVIDER = XYZ
ORGANIZATION = ABC
CONTEXT_META_FIELDS = filename,project_id,document_source
TITLE_META_FIELDS = filename,page

[ingestor]
# Size of each text chunk in characters
chunk_size = 700
# Overlap between consecutive chunks in characters
chunk_overlap = 50
# Maximum number of chunks to send to LLM (prevents context overflow)
max_chunks = 20
# Text separators for splitting, comma-separated (order of preference)
separators = \n\n,\n,. ,! ,? , ,
