title: ChaBo
description: RAG based chatbots framework, Built to Be Owned
url: "https://chabo-project.github.io"
baseurl: "/chabo"

# ── Links ────────────────────────────────────────────────────
github_repo: "https://github.com/chabo-project/chabo"
readme_url:  "https://github.com/chabo-project/chabo/blob/main/README.md"

# ── Hero section ─────────────────────────────────────────────
hero:
  eyebrow:   "Open source · PoC-to-Production · Responsible AI"
  line1:     "Your knowledge base."
  line2:     "Your infrastructure."
  line3:     "Your chatbot."
  subtitle:  >
    ChaBo is an open-source RAG framework for implementation and deployment 
    methodology that helps you deploy domain-specific AI chatbots — quickly, 
    responsibly, and affordably without handing control of your data to anyone else.
  badges:
    - "Open Source"
    - "No vendor lock-in"
    - "Data sovereign"
    - "Self-hostable"
    - "Cost-efficient"

# ── Problem section ──────────────────────────────────────────
problem:
  label: "The problem chabo solves"
  title_start: "Every team is reinventing"
  title_em:    "the same wheel"
  title_end:   "without the shared foundation."
  points:
    - heading: "Off-the-shelf"
      text: >
        Fast to set up, but your documents live on someone else's servers.
        Limited customisation, mounting subscription costs, and a dependency
        you can't escape.
    - heading: "Governance is handled inconsistently"
      text: >
        Without shared guidance, every team makes different decisions
        on data residency, model choice, and responsible use — often under
        time pressure, without the documentation to justify those decisions later.
    - heading: "Build it yourself"
      text: >
        Maximum control, but months of engineering time spent on plumbing
        instead of the actual product — and you still have to maintain it all.
    - heading: "Knowledge is not shared"
      text: >
        What works for an agricultural advisory chatbot in Uganda has direct
        lessons for a regulatory compliance tool in Brussels — but
        that knowledge stays locked inside individual organization teams.
        

# ── What ChaBo is ─────────────────────────────────────────────
components:
  label:    "What ChaBo is"
  title:    "More than code — a full deployment methodology"
  subtitle: >
    ChaBo has three parts. Most open-source RAG frameworks give you only the
    first. The second and third are what make it usable for real deployments.
  items:
    - icon:   "⚙️"
      title:  "Working code"
      status: "Available now"
      desc: >
        A modular, open-source RAG pipeline with tested defaults. Handles
        document ingestion, semantic search, reranking, and answer generation
        with citations. Deployable on HuggingFace Spaces or self-hosted
        infrastructure.
    - icon:   "📋"
      title:  "Decision Playbook"
      status: "Coming soon"
      desc: >
        Governance guidance for the decisions every team faces: which model
        to use, where data should live, how to handle responsible AI
        requirements, and how to manage costs. So teams stop making these
        calls in isolation.
    - icon:   "🗂️"
      title:  "Adaptation Patterns"
      status: "Coming soon"
      desc: >
        Documented real deployments showing what worked, what didn't, and
        what to reuse. Each pattern covers a specific context — language,
        bandwidth, document type, governance constraints — so the next
        deployment doesn't start from zero.

# ── Why ChaBo ─────────────────────────────────────────────────
features:
  label: "Why ChaBo"
  title: "Built for the constraints real deployments actually face"
  items:
    - icon:   "🔧"
      title:  "Swap components without rewriting everything"
      desc:   "Every component — embedding, retrieval, reranking, generation — is decoupled. As better models become available or requirements change, individual parts can be swapped without touching the rest. Nothing is hardwired — your architecture evolves as your needs do"
      jargon: "Modular architecture"
    - icon:   "🔒"
      title:  "Documents stay where you put them"
      desc:   "Your documents are stored in your own vector database — on HuggingFace Spaces, your organisation's infrastructure, or a cloud provider you control. You chose where your data resides."
      jargon: "Data sovereignty"
    - icon:   "☁️"
      title:  "Reference deployment on HuggingFace Spaces"
      desc:   "The tested reference deployment runs on HuggingFace Spaces. Docker Compose is available for local or on-premises deployment. Moving between environments does not require rewriting the application."
      jargon: "Portable deployment"
    - icon:   "⚡"
      title:  "Lightweight and cost-efficient by design"
      desc:   "ChaBo is built to work with efficient, open-weight models. Suitable for 100–1,000 document collections without expensive GPU infrastructure. Clear graduation path for larger-scale needs when the time comes."
      jargon: "Cost-efficient inference"
    - icon:   "🤝"
      title:  "One methodology, many deployments"
      desc:   "The same ChaBo framework can be adapted across contexts with different languages, document types, and governance requirements — without each team starting from zero."
      jargon: "Reusable foundation"
    - icon:   "🌍"
      title:  "No licence costs — but honest about what's not free"
      desc:   "The code is fully open source. Inference costs, hosting, and maintenance are real. The Decision Playbook will provide cost modelling guidance so teams can budget accurately from the start."
      jargon: "Open source · Cost-transparent"

# ── Tech stack strip ─────────────────────────────────────────
stack:
  label: "Built on"
  items:
    - "FastAPI"
    - "LangChain + LangGraph"
    - "Qdrant"
    - "HuggingFace TEI"
    - "Docker"

# ── CTA section ──────────────────────────────────────────────
cta:
  label:       "Get involved"
  title_start: "Start with the code."
  title_em:    "Contribute to the methodology."
  subtitle: >
    Explore the repository, read the onboarding documentation, or get in
    touch if you have a deployment in mind. ChaBo is built through use —
    the more projects deploy it, the stronger the shared foundation becomes.

