title: ChaBo
description: RAG based chatbots framework, Built to Be Owned
url: "https://chabo-project.github.io"
baseurl: "/chabo"

# ── Links ────────────────────────────────────────────────────
github_repo: "https://github.com/chabo-project/chabo"
readme_url:  "https://github.com/chabo-project/chabo/blob/main/README.md"

# ── Hero section ─────────────────────────────────────────────
hero:
  eyebrow:   "Open source · PoC-to-Production · Responsible AI"
  line1:     "Your knowledge base."
  line2:     "Your infrastructure."
  line3:     "Your chatbot."
  subtitle:  >
    ChaBo is an open-source RAG framework for implementation and deployment 
    methodology that helps you deploy domain-specific AI chatbots — quickly, 
    responsibly, and affordably without handing control of your data to anyone else.
  badges:
    - "Open Source"
    - "No vendor lock-in"
    - "Data sovereign"
    - "Self-hostable"
    - "Cost-efficient"

# ── Problem section ──────────────────────────────────────────
problem:
  label: "The problem chabo solves"
  title_start: "Every team is reinventing"
  title_em:    "the same wheel"
  title_end:   "without the shared foundation."
  points:
    - heading: "Off-the-shelf"
      text: >
        Fast to set up, but your documents live on someone else's servers.
        Limited customisation, mounting subscription costs, and a dependency
        you can't escape.
    - heading: "Governance is handled inconsistently"
      text: >
        Without shared guidance, every team makes different decisions
        on data residency, model choice, and responsible use — often under
        time pressure, without the documentation to justify those decisions later.
    - heading: "Build it yourself"
      text: >
        Maximum control, but months of engineering time spent on plumbing
        instead of the actual product — and you still have to maintain it all.
    - heading: "Knowledge is not shared"
      text: >
        What works for an agricultural advisory chatbot in Uganda has direct
        lessons for a regulatory compliance tool in Brussels — but
        that knowledge stays locked inside individual organization teams.
        

# ── What is ChaBo (three components) ────────────────────────
components:
  label:    "What ChaBo is"
  title:    "More than code — a full deployment methodology"
  subtitle: >
    ChaBo has three parts. Most open-source RAG frameworks give you only the
    first. The second and third are what make it usable for development
    cooperation projects.
  items:
    - icon:   "⚙️"
      title:  "Working code"
      status: "Available now"
      desc: >
        A modular, open-source RAG pipeline with tested defaults. Handles
        document ingestion, semantic search, reranking, and answer generation
        with citations. Deployable on HuggingFace Spaces or self-hosted
        infrastructure.
    - icon:   "📋"
      title:  "Decision Playbook"
      status: "Coming — soon"
      desc: >
        Governance guidance for the decisions every project faces: which model
        to use, where data should live, how to handle responsible AI
        requirements, and how to manage costs. So teams stop making these
        calls in isolation.
    - icon:   "🗂️"
      title:  "Adaptation Patterns"
      status: "Coming — soon"
      desc: >
        Documented real deployments showing what worked, what didn't, and
        what to reuse. Each pattern covers a specific context — language,
        bandwidth, document type, governance constraints — so the next
        project doesn't start from zero.


# ── Tech stack strip ─────────────────────────────────────────
stack:
  label: "Built on"
  items:
    - "FastAPI"
    - "LangChain + LangGraph"
    - "Qdrant"
    - "HuggingFace TEI"
    - "Docker"

# ── CTA section ──────────────────────────────────────────────
cta:
  label:    "Get started"
  title_start: "Ready to own your"
  title_em: "AI infrastructure?"
  subtitle: "Full deployment guides, API reference, and configuration docs in the README. Up and running in under an hour."

